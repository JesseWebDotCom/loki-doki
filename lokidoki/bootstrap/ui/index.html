<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/bootstrap/lokidoki-logo.svg">
    <link rel="stylesheet" href="/bootstrap/bootstrap.css">
    <title>LokiDoki · Getting things ready</title>
    <!-- BOOTSTRAP_DATA -->
</head>
<body>
    <div class="wizard">
        <div class="ghost">
            <img src="/bootstrap/lokidoki-logo.svg" width="56" height="56" alt="LokiDoki" />
        </div>
        <h1 id="page-title">Getting LokiDoki ready</h1>

        <div id="category-stepper" class="categories"></div>

        <div class="progress-ring-wrap">
            <svg class="progress-ring" viewBox="0 0 120 120">
                <circle class="progress-ring-bg" cx="60" cy="60" r="52" />
                <circle class="progress-ring-fill" id="progress-ring" cx="60" cy="60" r="52" />
            </svg>
            <span class="ring-center" id="ring-center">
                <span class="ring-pct" id="ring-pct">0%</span>
            </span>
        </div>

        <p class="current-step" id="current-task">Getting ready...</p>
        <p class="step-counter" id="step-counter" hidden></p>
        <p class="subtitle subtitle-detail" id="profile-label" hidden></p>

        <div id="halt-banner" class="halt-banner" hidden>
            <div class="halt-icon">!</div>
            <div class="halt-body">
                <p class="halt-title">Something went wrong</p>
                <p id="halt-error" class="halt-error"></p>
                <p id="halt-remediation" class="halt-remediation"></p>
                <button type="button" id="retry-btn" class="btn btn-retry">Try again</button>
            </div>
        </div>

        <button id="launch-btn" type="button" class="btn btn-launch">Open LokiDoki</button>

        <button class="log-toggle" type="button" id="toggle-console-btn">Show details</button>
        <pre id="console" class="console" hidden></pre>
    </div>
    <script src="/bootstrap/bootstrap.js"></script>
</body>
</html>
