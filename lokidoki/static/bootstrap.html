<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokiDoki Core • Bootstrap Wizard</title>
    <style>
        :root {
            --bg: #0c0d0e;
            --surface: #131416;
            --brand: #3b82f6;
            --text-dim: #6b7280;
            --text-bright: #e5e7eb;
            --success: #10b981;
            --failure: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-bright);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .wizard-container {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .steps-container {
            text-align: left;
            margin-bottom: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--text-dim);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .step.active .step-icon { border-color: var(--brand); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .step.done .step-icon { background: var(--success); border-color: var(--success); }
        .step.failed .step-icon { background: var(--failure); border-color: var(--failure); }

        .progress-bar-bg {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--brand);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .details-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: underline;
        }

        .details-btn:hover { color: var(--text-bright); }

        .console {
            display: none;
            margin-top: 16px;
            background: #000;
            border-radius: 8px;
            padding: 12px;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 12px;
            text-align: left;
            height: 120px;
            overflow-y: auto;
            color: #10b981;
            opacity: 0.8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            border: none;
        }

        .btn-launch { background: var(--brand); color: white; display: none; }
        .btn-launch:hover { transform: translateY(-1px); opacity: 0.9; }

        .btn-disabled { background: #232427; color: #4b4c50; cursor: not-allowed; }

        .loading-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            display: none;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ghost-icon {
            display: inline-block;
            margin-bottom: 24px;
            color: var(--brand);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="wizard-container">
        <div class="ghost-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-1.9a9 9 0 1 1 3.2 3.2L11 24"/><circle cx="9" cy="9" r="6"/><circle cx="15" cy="15" r="6"/></svg>
        </div>
        <h1>LokiDoki Initializing</h1>
        <p class="subtitle">Autonomous Agent & Skill Orchestrator Pipeline</p>

        <div class="steps-container">
            <div id="check-python" class="step"><div class="step-icon"></div> Python Runtime 3.11+</div>
            <div id="check-uv" class="step"><div class="step-icon"></div> Dependency Engine (uv)</div>
            <div id="check-deps" class="step"><div class="step-icon"></div> Library Synchronization</div>
            <div id="check-ui" class="step"><div class="step-icon"></div> Frontend Core Bundle</div>
            <div id="check-models" class="step"><div class="step-icon"></div> LLM Residence (Gemma 2B)</div>
        </div>

        <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
        
        <button class="details-btn" onclick="toggleConsole()">Show Detail View</button>
        <div id="console" class="console">Initializing bootstrap listener...</div>

        <div class="buttons">
            <button id="launch-btn" class="btn btn-launch" onclick="launchApp()">Launch Chat Interface</button>
            <button id="waiting-btn" class="btn btn-disabled">Please Wait...</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('console');
        const progressEl = document.getElementById('progress-fill');
        const steps = ['check-python', 'check-uv', 'check-deps', 'check-ui', 'check-models'];
        let currentStepIdx = 0;

        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            statusEl.appendChild(div);
            statusEl.scrollTop = statusEl.scrollHeight;
        }

        function toggleConsole() {
            const c = document.getElementById('console');
            c.style.display = c.style.display === 'block' ? 'none' : 'block';
        }

        function updateStep(id, status) {
            const el = document.getElementById(id);
            el.className = `step ${status}`;
            if (status === 'done') {
                currentStepIdx++;
                progressEl.style.width = `${(currentStepIdx / steps.length) * 100}%`;
            }
        }

        // Connect to Server-Sent Events from backend
        const eventSource = new EventSource('/api/v1/bootstrap/status');

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            log(data.message);

            if (data.type === 'step_start') {
                updateStep(data.step_id, 'active');
            } else if (data.type === 'step_done') {
                updateStep(data.step_id, 'done');
            } else if (data.type === 'step_failed') {
                updateStep(data.step_id, 'failed');
            } else if (data.type === 'complete') {
                document.getElementById('waiting-btn').style.display = 'none';
                document.getElementById('launch-btn').style.display = 'block';
                log("Bootstrap sequence complete. System ready.");
                eventSource.close();
            }
        };

        eventSource.onerror = (e) => {
            log("Error connecting to bootstrap server. Retrying...");
        };

        function launchApp() {
            window.location.href = "/";
        }
    </script>
</body>
</html>
