<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokiDoki · Getting things ready</title>
    <style>
        :root {
            --bg: #0c0d0e;
            --surface: #131416;
            --surface-2: #1a1c1f;
            --brand: #7c5cff;
            --brand-soft: rgba(124, 92, 255, 0.14);
            --text-dim: #8e93a0;
            --text-bright: #f2f4f8;
            --success: #10b981;
            --failure: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
        }

        body {
            background:
                radial-gradient(circle at top, rgba(124, 92, 255, 0.12), transparent 28%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.08), transparent 24%),
                var(--bg);
            color: var(--text-bright);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 32px 20px;
            box-sizing: border-box;
        }

        .wizard-container {
            width: 100%;
            max-width: 700px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
                var(--surface);
            border-radius: 32px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .wizard-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(124,92,255,0.08), transparent 38%),
                linear-gradient(315deg, rgba(59,130,246,0.06), transparent 32%);
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2.3rem, 5vw, 3.4rem);
            font-weight: 800;
            margin: 0 0 10px;
            letter-spacing: -0.03em;
            color: var(--text-bright);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 18px;
            line-height: 1.7;
            margin: 0 auto 34px;
            font-weight: 500;
            max-width: 540px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            text-align: left;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .step-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
        }

        .step.active { border-color: rgba(124, 92, 255, 0.55); background: var(--brand-soft); }
        .step.active .step-icon { background: var(--brand); box-shadow: 0 0 10px var(--brand); }
        .step.done .step-icon { background: var(--success); }
        .step.failed .step-icon { background: var(--failure); }

        .progress-section {
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--brand) 0%, #a78bfa 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 999px;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .details-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
        }

        .details-btn:hover { color: var(--text-bright); border-color: rgba(255, 255, 255, 0.2); }

        .console {
            display: none;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 18px;
            padding: 18px;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 12px;
            text-align: left;
            height: 180px;
            overflow-y: auto;
            color: #10b981;
            opacity: 0.8;
            border: 1px solid rgba(255, 255, 255, 0.08);
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
            position: relative;
            z-index: 1;
        }

        .btn {
            padding: 16px 18px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-launch { 
            background: var(--brand); 
            color: white; 
            display: none;
            box-shadow: 0 14px 28px -10px rgba(124, 92, 255, 0.55);
        }
        .btn-launch:hover { transform: translateY(-2px); box-shadow: 0 18px 34px -10px rgba(124, 92, 255, 0.65); }

        .btn-disabled { background: #1e1f21; color: #4b4c50; cursor: not-allowed; }

        .ghost-icon {
            display: inline-block;
            margin-bottom: 22px;
            color: var(--brand);
            animation: float 4s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0); } }

        @media (max-width: 720px) {
            .wizard-container {
                padding: 28px 22px;
                border-radius: 24px;
            }

            .steps-grid {
                grid-template-columns: 1fr;
            }

            .subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="wizard-container">
        <div class="ghost-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/></svg>
        </div>
        <h1>Hey, I'm LokiDoki!</h1>
        <p class="subtitle">Give me a sec to wake up — I'll be ready to chat in just a moment.</p>

        <div class="steps-grid">
            <div id="check-python" class="step"><div class="step-icon"></div> Python Runtime</div>
            <div id="check-uv" class="step"><div class="step-icon"></div> uv Engine</div>
            <div id="check-frontend-deps" class="step"><div class="step-icon"></div> UI Libraries</div>
            <div id="check-frontend-build" class="step"><div class="step-icon"></div> UI Optimization</div>
            <div id="check-ollama" class="step"><div class="step-icon"></div> Ollama Service</div>
            <div id="pull-model" class="step"><div class="step-icon"></div> Resident Model</div>
            <div id="warm-resident" class="step"><div class="step-icon"></div> Memory Load</div>
            <div id="check-piper" class="step"><div class="step-icon"></div> Piper Voice</div>
            <div id="check-residency" class="step"><div class="step-icon"></div> System Health</div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
            <div class="console-header">
                <span id="current-task" style="font-size: 11px; color: var(--text-dim); font-weight: 600;">System idle...</span>
                <button class="details-btn" onclick="toggleConsole()">View Detailed Logs</button>
            </div>
        </div>
        
        <div id="console" class="console">
            <div>[System] Initializing session...</div>
        </div>

        <div class="buttons">
            <button id="launch-btn" class="btn btn-launch" onclick="launchApp()">Let's chat →</button>
            <button id="waiting-btn" class="btn btn-disabled">Just a sec...</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('console');
        const progressEl = document.getElementById('progress-fill');
        const taskEl = document.getElementById('current-task');
        
        const steps = [
            'check-python', 'check-uv', 'check-frontend-deps', 
            'check-frontend-build', 'check-ollama', 'pull-model',
            'warm-resident',
            'check-piper', 'check-residency'
        ];
        let currentStepIdx = 0;

        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            statusEl.appendChild(div);
            // Limit log lines for performance
            if (statusEl.children.length > 500) statusEl.removeChild(statusEl.firstChild);
            statusEl.scrollTop = statusEl.scrollHeight;
        }

        function toggleConsole() {
            const c = document.getElementById('console');
            c.style.display = c.style.display === 'block' ? 'none' : 'block';
        }

        function updateStep(id, status) {
            const el = document.getElementById(id);
            if (!el) return;
            el.className = `step ${status}`;
            if (status === 'done') {
                currentStepIdx++;
                progressEl.style.width = `${(currentStepIdx / steps.length) * 100}%`;
            }
        }

        // Connect to SSE
        const eventSource = new EventSource('/api/v1/bootstrap/status');

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'log') {
                log(data.message);
                return;
            }

            if (data.type === 'step_start') {
                taskEl.textContent = data.message;
                updateStep(data.step_id, 'active');
                log(`[START] ${data.message}`);
            } else if (data.type === 'step_done') {
                updateStep(data.step_id, 'done');
                log(`[DONE] ${data.step_id} verified.`);
            } else if (data.type === 'step_failed') {
                updateStep(data.step_id, 'failed');
                log(`[ERROR] ${data.message}`);
                taskEl.textContent = "Pipeline halted. Check logs.";
                taskEl.style.color = "var(--failure)";
            } else if (data.type === 'complete') {
                progressEl.style.width = '100%';
                document.getElementById('waiting-btn').style.display = 'none';
                document.getElementById('launch-btn').style.display = 'block';
                taskEl.textContent = "System Ready.";
                taskEl.style.color = "var(--success)";
                log("All systems operational. Launching enabled.");
                eventSource.close();
            }
        };

        function launchApp() {
            window.location.href = "/";
        }
    </script>
</body>
</html>
