repos:
- repo: local
  hooks:
    - id: pytest-unit
      name: pytest-unit (Fast)
      entry: pytest tests/unit
      language: system
      types: [python]
      pass_filenames: false
      stages: [commit]
    - id: pytest-full
      name: pytest-full (Full Suite)
      entry: pytest tests
      language: system
      types: [python]
      pass_filenames: false
      stages: [push]
    - id: secret-scanner
      name: Secret Scanner
      entry: .githooks/pre-commit
      language: script
      pass_filenames: false
      stages: [commit]
